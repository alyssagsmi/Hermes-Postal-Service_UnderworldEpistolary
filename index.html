<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Postal Service | Official Logistics Portal</title>

    <style>
        body {
            background: #f4f1e8;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            color: #2b2b2b;
        }

        /* HEADER */
        .header {
            background: #d4b46a;
            border-bottom: 6px solid #8a6d2f;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .header img {
            width: 60px;
            position: absolute;
            left: 25px;
            top: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subheader {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 15px;
            background: #8a6d2f;
            color: #fff;
            font-weight: bold;
            border-radius: 4px;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            border: 3px solid #8a6d2f;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* LOGISTICS TABLE */
        .logistics-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .logistics-table td {
            padding: 12px 5px;
            border-bottom: 1px solid #d4b46a;
        }

        .label {
            font-weight: bold;
            width: 180px;
            color: #8a6d2f;
            text-transform: uppercase;
        }

        /* DELIVERY RULES SECTION */
        .rules-section {
            margin-top: 40px;
            padding: 20px;
            background: #f9f5e9;
            border: 2px dashed #8a6d2f;
        }

        .rules-section h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-size: 20px;
            color: #8a6d2f;
        }

        .rules-section ul {
            margin: 10px 0 20px 20px;
        }

        /* CHATBOT */
        .chat-box {
            border: 2px solid #8a6d2f;
            padding: 15px;
            background: #fffdf7;
            margin-top: 40px;
        }

        .chat-header {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #8a6d2f;
            padding-bottom: 5px;
            font-size: 12px;
            color: #8a6d2f;
        }

        #chat-output {
            height: 120px;
            overflow-y: auto;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .chat-input-area {
            display: flex;
            gap: 5px;
        }

        input {
            flex-grow: 1;
            padding: 6px;
            border: 1px solid #8a6d2f;
            background: #fff;
        }

        button {
            background: #8a6d2f;
            color: #fff;
            border: none;
            padding: 6px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* FOOTER */
        .footer {
            margin-top: 50px;
            font-size: 11px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #8a6d2f;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Envelope_font_awesome.svg/1024px-Envelope_font_awesome.svg.png">
